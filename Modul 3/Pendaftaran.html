    <article>
      <h1>Form Pendaftaran Seminar</h1>
      <p>Silakan isi data berikut untuk mendaftar:</p>
      
      <form>
        Nama Lengkap: <input type="text" name="nama" required><br>
        Email: <input type="email" name="email" required><br>
        No. Telepon: <input type="tel" name="telp" pattern="[0-9]{4}-[0-9]{6}" placeholder="contoh: 0812-123456" required><br>
        Tanggal Lahir: <input type="date" name="tgl_lahir" min="1987-01-01" max="1993-01-01"><br>
        Tingkat Kepentingan: <input type="range" min="0" max="10"><br>
        Pilih Sesi:
        <select name="sesi">
          <option value="17.00">17.00</option>
          <option value="19.00">19.00</option>
          <option value="21.00">21.00</option>
        </select><br>
        Komentar: <textarea name="komentar"></textarea><br>
        <input type="submit" value="Daftar">
      </form>
      
      <p><!-- Kesimpulan hasil ujicoba ditulis di sini --></p>
    </article>
  </section>

    <p>Footer Website</p>
