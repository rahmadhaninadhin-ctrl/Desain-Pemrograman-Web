    <article>
      <h1>Contoh Canvas</h1>
      <p>Berikut adalah contoh menggambar menggunakan Canvas:</p>
      
      <!-- Canvas pertama -->
      <canvas id="canvas1" width="200" height="200"></canvas>
      
      <!-- Canvas kedua -->
      <canvas id="canvas2" width="200" height="200"></canvas>
      
      <script>
        // Canvas pertama: kotak merah
        let c1 = document.getElementById("canvas1");
        let ctx1 = c1.getContext("2d");
        ctx1.fillStyle = "red";
        ctx1.fillRect(20,20,100,100);

        // Canvas kedua: lingkaran biru
        let c2 = document.getElementById("canvas2");
        let ctx2 = c2.getContext("2d");
        ctx2.beginPath();
        ctx2.arc(100,100,50,0,2*Math.PI);
        ctx2.fillStyle = "blue";
        ctx2.fill();
      </script>
      
      <p><!-- Kesimpulan hasil ujicoba ditulis di sini --></p>
    </article>
  </section>

  <footer>
    <p>Footer Website</p>
  </footer>
