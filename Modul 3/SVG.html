    <article>
      <h1>Contoh SVG</h1>
      <p>Berikut adalah beberapa bentuk SVG:</p>
      
      <!-- Lingkaran -->
      <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow"/>
      </svg>
      
      <!-- Persegi panjang -->
      <svg width="120" height="80">
        <rect width="100" height="50" style="fill:blue; stroke:black; stroke-width:2"/>
      </svg>
      
      <!-- Poligon -->
      <svg height="200" width="200">
        <polygon points="100,10 190,190 10,190"
                 style="fill:lime;stroke:purple;stroke-width:2"/>
      </svg>
      
      <p><!-- Kesimpulan hasil ujicoba ditulis di sini --></p>
