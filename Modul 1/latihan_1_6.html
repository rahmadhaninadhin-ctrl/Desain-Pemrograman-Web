<!DOCTYPE html>
<html>
    <head>
        <title>Menampilkan Gambar</title>
        <meta charset="UTF-8">
        <meta name="description" content="Latihan menampilkan gambar">
        <meta name="keywords" content="gambar, img, src, alt, width, height">
        <meta name="author" content="Nadhin Ayudya">
    </head>
    <body>
        <h1>Menampilkan Gambar</h1>

        <!-- Gambar dengan ukuran asli -->
        <img src="Gambar/Buah.jpg" alt="Gambar Buah"/>
        
        <!-- Gambar dengan ukuran diatur -->
        <img src="Gambar/Makanan.jpg" alt="Gambar Makanan" width="200" height="150"/>

        <!-- Gambar dengan teks alternatif -->
        <img src="Gambar/Gender.png" alt="Icon Gender" width="100" height="100"/>
    </body>
</html>
