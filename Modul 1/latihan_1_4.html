<!DOCTYPE html>
<html>
    <head>
        <title>Order List</title>
        <link rel="icon" type="img/png" href="gambar/icon.png" sizes="17x17" />
        <meta charset="UTF-8">
        <meta name="description" content="Halaman Order List">
        <meta name="keywords" content="list, ordered, unordered,">
        <meta name="author" content="Nadhin Ayudya">
    </head>
    <body>
        <h1>Ordered List</h1>
        <ol>
            <li>Apel</li>
            <li>Pisang</li>
            <li>Jeruk</li>
            <li>Mangga</li>
        </ol>

        <h1>Unordered List</h1>
        <ul>
            <li>Nasi Goreng</li>
            <li>Sate Ayam</li>
            <li>Soto</li>
            <li>Bakso</li>
        </ul>

        <h1>Nested List</h1>
        <ul>
            <li>Laki-laki
                <ul>
                    <li>Anak Laki-laki</li>
                    <li>Dewasa Laki-laki</li>
                </ul>
            </li>
            <li>Perempuan
                <ul>
                    <li>Anak Perempuan</li>
                    <li>Dewasa Perempuan</li>
                </ul>
            </li>
        </ul>
    </body>
</html>
