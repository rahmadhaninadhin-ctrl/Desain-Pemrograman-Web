<!DOCTYPE html>
<html>
    <head>
        <title>Hyperlink HTML</title>
        <link rel="icon" type="img/png" href="gambar/icon.png" sizes="17x17" />
        <meta charset="UTF-8">
        <meta name="description" content="Latihan hyperlink dengan target">
        <meta name="keywords" content="hyperlink, target, self, blank, parent, top">
        <meta name="author" content="Nadhin Ayudya">
    </head>
    <body>
        <h1>Contoh Hyperlink</h1>

        <p><a href="https://www.google.com" target="_self">Link dengan target _self</a></p>
        <p><a href="https://www.yahoo.com" target="_blank">Link dengan target _blank</a></p>
        <p><a href="https://www.bing.com" target="_parent">Link dengan target _parent</a></p>
        <p><a href="https://www.wikipedia.com" target="_top">Link dengan target _top</a></p>
    </body>
</html>
