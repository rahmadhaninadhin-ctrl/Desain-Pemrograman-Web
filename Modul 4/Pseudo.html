<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pseudo Class Selector</title>
  <style>
    p { display: none; background-color: darkgray; padding: 20px; }
    div:hover p { display: block; } 
    a:hover { color: red; } 
  </style>
</head>
<body>
  <div>
    Letakkan kursor di sini untuk melihat elemen p
    <p>Saya adalah elemen p</p>
  </div>

  <a href="#">Ini adalah link, arahkan mouse ke sini</a>
</body>
</html>
