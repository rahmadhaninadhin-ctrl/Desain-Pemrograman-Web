<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Padding Example</title>
  <style>
    div {
      border: 1px solid black;
      padding: 40px; /* jarak isi dengan border */
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <div>
    Elemen ini memiliki padding atas, kanan, bawah, dan kiri masing-masing 40px.
  </div>
</body>
</html>
