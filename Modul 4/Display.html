<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display Example</title>
  <style>
    div {
      border: 1px solid black;
      padding: 10px;
      margin: 5px;
    }

    .inline {
      display: inline;
      background-color: lightgreen;
    }

    .block {
      display: block;
      background-color: lightblue;
    }

    .none {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Contoh penggunaan display</h2>

  <div class="inline">Elemen ini tampil inline</div>
  <div class="inline">Elemen ini juga tampil inline</div>

  <div class="block">Elemen ini tampil block</div>
  <div class="block">Elemen ini juga tampil block</div>

  <div class="none">Elemen ini tidak ditampilkan (display: none)</div>
</body>
</html>
