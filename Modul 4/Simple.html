<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Belajar Simple Selector</title>
  <style>
    p { text-align: center; color: aqua; }
    #kalimat { text-align: left; color: red; }
    .center { text-align: center; color: chocolate; }
    p.tengah { text-align: center; color: darkmagenta; display: block; background-color: #777777; }
  </style>
</head>
  <body>
    <body>
      <p>Penggunaan CSS sangat membantu web desainer...</p>
      <p id="kalimat">Dalam penulisan CSS sangat sederhana...</p>
      <p class="center">CSS mempunyai sifat pewarisan...</p>
      <p class="tengah">Ini adalah hasil selector dengan elemen p class tengah</p>
    </body>
  </body>
</html>
