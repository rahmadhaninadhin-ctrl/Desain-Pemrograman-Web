<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galeri Foto Flexbox</title>
  <style>
    .wadah_foto {
      display: flex;
      flex-wrap: wrap;
      justify-content: center; /* agar foto rata tengah */
    }
    .wadah_foto img {
      width: 150px;   /* ganti sesuai NRP terakhir */
      height: 150px;
      margin: 5px;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <h1>Galeri Foto</h1>
  <div class="wadah_foto">
    <img src="image/1.jpg" alt="Foto 1">
    <img src="image/2.jpg" alt="Foto 2">
    <img src="image/3.jpg" alt="Foto 3">
    <img src="image/4.jpg" alt="Foto 4">
    <img src="image/5.jpg" alt="Foto 5">
    <img src="image/6.jpg" alt="Foto 6">
    <img src="image/7.jpg" alt="Foto 7">
    <img src="image/8.jpg" alt="Foto 8">
    <img src="image/9.jpg" alt="Foto 9">
    <img src="image/10.jpg" alt="Foto 10">
    <img src="image/11.jpg" alt="Foto 11">
    <img src="image/12.jpg" alt="Foto 12">
    <img src="image/13.jpg" alt="Foto 13">
    <img src="image/14.jpg" alt="Foto 14">
    <img src="image/15.jpg" alt="Foto 15">
    <img src="image/16.jpg" alt="Foto 16">
    <img src="image/17.jpg" alt="Foto 17">
    <img src="image/18.jpg" alt="Foto 18">
  </div>
</body>
</html>
