<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Belajar Flex Box</title>
  <style>
    .wadah_flex {
      display: flex;
      /* skenario tambahan */
      flex-direction: row;   /* bisa diganti column */
      flex-wrap: wrap;       /* bisa diganti nowrap */
      flex-flow: row wrap;   /* gabungan flex-direction + flex-wrap */
      justify-content: center; /* bisa diganti space-between, space-around */
    }

    .wadah_flex > div {
      background-color: lightblue;
      margin: 10px;
      padding: 20px;
      font-size: 30px;
    }
  </style>
</head>
<body>
  <div class="wadah_flex">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
    <div>9</div>
    <div>10</div>
    <div>11</div>
    <div>12</div>
  </div>

  <!-- Kesimpulan tiap skenario -->
  <p>Kesimpulan skenario 1 adalah : ...</p>
  <p>Kesimpulan skenario 2 adalah : ...</p>
  <p>Kesimpulan skenario 3 adalah : ...</p>
  <p>Kesimpulan skenario 4 adalah : ...</p>
  <p>Kesimpulan skenario 5 adalah : ...</p>
  <p>Kesimpulan skenario 6 adalah : ...</p>
</body>
</html>
