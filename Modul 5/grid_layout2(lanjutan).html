<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Belajar Grid</title>
  <style>
    .grid-container {
      display: grid;
      grid-gap: 50px;
      background-color: #2196F3;
      grid-template-columns: auto auto auto auto;
      padding: 10px;
    }
    .item1 {
      background-color: rgba(255,255,255,0.8);
      padding: 20px;
      font-size: 30px;
      text-align: center;
      /* skenario tambahan */
      grid-row: 1 / 4;   /* skenario 1: item1 memanjang ke bawah */
      /* atau bisa diganti dengan:
         grid-column: 1 / 4;   skenario 2: item1 melebar ke samping */
    }
    .item {
      background-color: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.8);
      padding: 20px;
      font-size: 30px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="item1">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
  </div>
  <div>Kesimpulan skenario disini</div>
</body>
</html>
